<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>3-Set Workout</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #f2f2f7;
  color: #1c1c1e;
  max-width: 430px;
  margin: 0 auto;
  padding: 0 16px;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0 8px;
  position: sticky;
  top: 0;
  background: #f2f2f7;
  z-index: 10;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .date { font-size: 13px; color: #8e8e93; }
.header-right { display: flex; gap: 12px; align-items: center; }
.btn-text {
  font-size: 15px;
  color: #007aff;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  font-weight: 500;
}

/* Group tabs */
.group-tabs {
  display: flex;
  gap: 8px;
  padding: 8px 0 14px;
  position: sticky;
  top: 52px;
  background: #f2f2f7;
  z-index: 9;
}
.group-tab {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  border: 2px solid #e5e5ea;
  border-radius: 12px;
  background: #fff;
  color: #8e8e93;
  cursor: pointer;
  transition: all 0.15s ease;
}
.group-tab:active { transform: scale(0.97); }
.group-tab.active {
  background: #007aff;
  border-color: #007aff;
  color: #fff;
}

/* Exercise card */
.exercise {
  background: #fff;
  border-radius: 14px;
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: 0 0.5px 1px rgba(0,0,0,0.05);
}
.exercise-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.exercise-name { font-size: 16px; font-weight: 600; }
.exercise-weight { font-size: 13px; color: #8e8e93; font-weight: 500; }

/* Sets */
.sets { display: flex; gap: 8px; }
.set { flex: 1; text-align: center; }
.set-label { font-size: 11px; color: #aeaeb2; margin-bottom: 2px; }
.set-target { font-size: 12px; color: #c7c7cc; margin-bottom: 6px; }
.set-btn {
  width: 100%;
  padding: 16px 0;
  font-size: 22px;
  font-weight: 700;
  border: 2px solid #e5e5ea;
  border-radius: 12px;
  background: #fff;
  color: #c7c7cc;
  cursor: pointer;
  transition: all 0.15s ease;
  -webkit-appearance: none;
}
.set-btn:active { transform: scale(0.95); }
.set-btn.done {
  background: #34c759;
  border-color: #34c759;
  color: #fff;
}
.set-btn.partial {
  background: #ff9500;
  border-color: #ff9500;
  color: #fff;
}

/* Edit mode */
.edit-screen { display: none; }
.edit-screen.active { display: block; }
.workout-screen.hidden { display: none; }

/* Edit group section */
.edit-group-section { margin-bottom: 16px; }
.edit-group-header {
  font-size: 14px;
  font-weight: 700;
  color: #8e8e93;
  padding: 8px 4px 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.edit-card {
  background: #fff;
  border-radius: 14px;
  margin-bottom: 10px;
  padding: 14px 16px;
  box-shadow: 0 0.5px 1px rgba(0,0,0,0.05);
}
.edit-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.edit-card-actions { display: flex; gap: 6px; }
.btn-icon {
  width: 32px;
  height: 32px;
  border: 1px solid #e5e5ea;
  border-radius: 8px;
  background: #f9f9f9;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:disabled { opacity: 0.3; cursor: default; }
.btn-icon.delete { color: #ff3b30; border-color: #ffcdd2; }

.edit-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}
.edit-row label {
  font-size: 12px;
  color: #8e8e93;
  min-width: 40px;
}
.edit-input {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid #e5e5ea;
  border-radius: 8px;
  font-size: 14px;
  background: #f9f9f9;
  -webkit-appearance: none;
}
.edit-input:focus { outline: none; border-color: #007aff; background: #fff; }
.edit-input.small { max-width: 60px; text-align: center; }

.edit-targets {
  display: flex;
  gap: 6px;
  align-items: center;
}

.unit-toggle {
  display: flex;
  gap: 0;
  border: 1px solid #e5e5ea;
  border-radius: 8px;
  overflow: hidden;
}
.unit-toggle button {
  padding: 6px 10px;
  font-size: 12px;
  border: none;
  background: #f9f9f9;
  cursor: pointer;
  color: #8e8e93;
}
.unit-toggle button.active {
  background: #007aff;
  color: #fff;
}

.btn-add {
  width: 100%;
  padding: 12px;
  border: 2px dashed #c7c7cc;
  border-radius: 12px;
  background: none;
  font-size: 14px;
  color: #8e8e93;
  cursor: pointer;
  margin-bottom: 6px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c1e;
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 100;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Bottom spacer */
.spacer { height: 40px; }

/* Number input modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 50;
  justify-content: center;
  align-items: flex-end;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #f2f2f7;
  width: 100%;
  max-width: 430px;
  border-radius: 20px 20px 0 0;
  padding: 20px 16px 40px;
}
.modal-title {
  font-size: 15px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 4px;
}
.modal-subtitle {
  font-size: 13px;
  color: #8e8e93;
  text-align: center;
  margin-bottom: 16px;
}
.modal-input {
  width: 100%;
  padding: 16px;
  font-size: 32px;
  font-weight: 700;
  text-align: center;
  border: 2px solid #e5e5ea;
  border-radius: 14px;
  background: #fff;
  -webkit-appearance: none;
  margin-bottom: 16px;
}
.modal-input:focus { outline: none; border-color: #007aff; }
.modal-buttons {
  display: flex;
  gap: 10px;
}
.modal-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.modal-btn.cancel { background: #e5e5ea; color: #1c1c1e; }
.modal-btn.confirm { background: #007aff; color: #fff; }
</style>
</head>
<body>

<!-- Workout Screen -->
<div class="workout-screen" id="workoutScreen">
  <div class="header">
    <h1>3-Set Workout</h1>
    <div class="header-right">
      <span class="date" id="todayDate"></span>
      <button class="btn-text" onclick="showEditScreen()">편집</button>
    </div>
  </div>
  <div class="group-tabs" id="groupTabs"></div>
  <div id="exerciseList"></div>
  <div class="spacer"></div>
</div>

<!-- Edit Screen -->
<div class="edit-screen" id="editScreen">
  <div class="header">
    <h1>루틴 편집</h1>
    <div class="header-right">
      <button class="btn-text" onclick="saveAndCloseEdit()">완료</button>
    </div>
  </div>
  <div id="editList"></div>
  <div class="spacer"></div>
</div>

<!-- Number Input Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <input class="modal-input" id="modalInput" type="number" inputmode="numeric" pattern="[0-9]*">
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="cancelModal()">취소</button>
      <button class="modal-btn confirm" onclick="confirmModal()">확인</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== Data ====================
const STORAGE_ROUTINE = '3sw-routine-v2';
const STORAGE_LOGS = '3sw-logs-v2';
const STORAGE_ACTIVE_GROUP = '3sw-active-group';
const MAX_LOG_DAYS = 365;

const DEFAULT_GROUPS = [
  {
    id: 'g1',
    name: '그룹 1',
    exercises: [
      { id: uid(), name: '턱걸이', weight: 35, weightUnit: 'kg', unit: 'reps', targets: [18, 12, 7], order: 0 },
      { id: uid(), name: '레그익스텐션', weight: 27.5, weightUnit: 'kg', unit: 'reps', targets: [17, 12, 7], order: 1 },
    ]
  },
  {
    id: 'g2',
    name: '그룹 2',
    exercises: [
      { id: uid(), name: '로우로우', weight: 35, weightUnit: 'kg', unit: 'reps', targets: [20, 15, 15], order: 0 },
      { id: uid(), name: '플랭크', weight: null, weightUnit: 'kg', unit: 'seconds', targets: [70, 60, 45], order: 1 },
    ]
  },
  {
    id: 'g3',
    name: '그룹 3',
    exercises: [
      { id: uid(), name: '팔굽혀펴기', weight: null, weightUnit: 'kg', unit: 'reps', targets: [28, 22, 17], order: 0 },
      { id: uid(), name: '윗몸일으키기', weight: null, weightUnit: 'kg', unit: 'reps', targets: [15, 15, 15], order: 1 },
    ]
  }
];

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function todayDisplay() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}

// ==================== Storage ====================
function loadRoutine() {
  if (storageAvailable) {
    try {
      const raw = localStorage.getItem(STORAGE_ROUTINE);
      if (raw) return JSON.parse(raw);
    } catch(e) { console.error('loadRoutine error:', e); }
  }
  const r = { id: uid(), groups: DEFAULT_GROUPS };
  saveRoutine(r);
  return r;
}

function saveRoutine(r) {
  if (!storageAvailable) return;
  try {
    localStorage.setItem(STORAGE_ROUTINE, JSON.stringify(r));
  } catch(e) {
    console.error('saveRoutine error:', e);
    showToast('저장 오류: ' + e.message);
  }
}

function loadLogs() {
  if (!storageAvailable) return [];
  try {
    const raw = localStorage.getItem(STORAGE_LOGS);
    if (raw) {
      let logs = JSON.parse(raw);
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - MAX_LOG_DAYS);
      const cutoffStr = cutoff.toISOString().split('T')[0];
      logs = logs.filter(l => l.date >= cutoffStr);
      return logs;
    }
  } catch(e) { console.error('loadLogs error:', e); }
  return [];
}

function saveLogs(logs) {
  if (!storageAvailable) return;
  try {
    localStorage.setItem(STORAGE_LOGS, JSON.stringify(logs));
  } catch(e) {
    console.error('saveLogs error:', e);
    showToast('저장 오류: ' + e.message);
  }
}

function getLog(groupId) {
  const logs = loadLogs();
  const today = todayStr();
  const key = today + ':' + groupId;
  let log = logs.find(l => l.id === key);
  if (!log) {
    const group = routine.groups.find(g => g.id === groupId);
    if (!group) return null;
    log = {
      id: key,
      date: today,
      groupId: groupId,
      groupName: group.name,
      entries: group.exercises.map(ex => ({
        exerciseId: ex.id,
        exerciseName: ex.name,
        weight: ex.weight,
        weightUnit: ex.weightUnit,
        unit: ex.unit,
        targets: [...ex.targets],
        actuals: [null, null, null]
      }))
    };
    logs.push(log);
    saveLogs(logs);
  }
  return log;
}

function updateLogEntry(groupId, exerciseId, setIndex, value) {
  const logs = loadLogs();
  const today = todayStr();
  const key = today + ':' + groupId;
  const log = logs.find(l => l.id === key);
  if (!log) return;
  const entry = log.entries.find(e => e.exerciseId === exerciseId);
  if (!entry) return;
  entry.actuals[setIndex] = value;
  saveLogs(logs);
}

function loadActiveGroup() {
  try {
    return localStorage.getItem(STORAGE_ACTIVE_GROUP) || null;
  } catch(e) { return null; }
}

function saveActiveGroup(groupId) {
  try {
    localStorage.setItem(STORAGE_ACTIVE_GROUP, groupId);
  } catch(e) {}
}

// ==================== Cleanup old v1 data ====================
try {
  localStorage.removeItem('3sw-routine');
  localStorage.removeItem('3sw-logs');
} catch(e) {}

// ==================== Check localStorage ====================
let storageAvailable = true;
try {
  const testKey = '__3sw_test__';
  localStorage.setItem(testKey, '1');
  localStorage.removeItem(testKey);
} catch(e) {
  storageAvailable = false;
  console.warn('localStorage not available:', e);
}

// ==================== State ====================
let routine = loadRoutine();
let activeGroupId = loadActiveGroup() || routine.groups[0]?.id || 'g1';
let currentLog = null;
let modalCallback = null;

// ==================== Render Workout ====================
function renderGroupTabs() {
  const tabs = document.getElementById('groupTabs');
  tabs.innerHTML = '';
  routine.groups.forEach(group => {
    const tab = document.createElement('button');
    tab.className = 'group-tab' + (group.id === activeGroupId ? ' active' : '');
    tab.textContent = group.name;
    tab.onclick = () => selectGroup(group.id);
    tabs.appendChild(tab);
  });
}

function selectGroup(groupId) {
  activeGroupId = groupId;
  saveActiveGroup(groupId);
  renderGroupTabs();
  renderWorkout();
}

function renderWorkout() {
  document.getElementById('todayDate').textContent = todayDisplay();
  renderGroupTabs();

  currentLog = getLog(activeGroupId);
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';

  if (!currentLog) return;

  currentLog.entries.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'exercise';

    const weightText = entry.weight !== null ? `${entry.weight}${entry.weightUnit}` : '';
    const unitSuffix = entry.unit === 'seconds' ? '초' : '';

    card.innerHTML = `
      <div class="exercise-header">
        <span class="exercise-name">${esc(entry.exerciseName)}</span>
        <span class="exercise-weight">${esc(weightText)}${entry.unit === 'seconds' && !weightText ? '⏱ 초' : ''}</span>
      </div>
      <div class="sets">
        ${entry.targets.map((target, si) => {
          const actual = entry.actuals[si];
          let btnClass = '';
          let btnText = '—';
          if (actual !== null) {
            btnText = actual + unitSuffix;
            btnClass = actual >= target ? 'done' : 'partial';
          }
          return `
            <div class="set">
              <div class="set-label">${si+1}세트</div>
              <div class="set-target">목표 ${target}${unitSuffix}</div>
              <button class="set-btn ${btnClass}" onclick="onSetTap('${entry.exerciseId}', ${si}, ${target}, ${actual !== null ? actual : 'null'}, '${esc(entry.exerciseName)}', '${entry.unit}')">${btnText}</button>
            </div>
          `;
        }).join('')}
      </div>
    `;
    list.appendChild(card);
  });
}

function onSetTap(exerciseId, setIndex, target, currentActual, name, unit) {
  const unitLabel = unit === 'seconds' ? '초' : '회';
  const defaultVal = currentActual !== null ? currentActual : target;
  openModal(
    `${name} — ${setIndex+1}세트`,
    `목표: ${target}${unitLabel}`,
    defaultVal,
    (value) => {
      if (value !== null && value >= 0) {
        updateLogEntry(activeGroupId, exerciseId, setIndex, value);
        renderWorkout();
      }
    }
  );
}

// ==================== Modal ====================
function openModal(title, subtitle, defaultValue, callback) {
  modalCallback = callback;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalSubtitle').textContent = subtitle;
  const input = document.getElementById('modalInput');
  input.value = defaultValue;
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => { input.focus(); input.select(); }, 100);
}

function confirmModal() {
  const input = document.getElementById('modalInput');
  const value = parseInt(input.value, 10);
  document.getElementById('modalOverlay').classList.remove('active');
  if (modalCallback && !isNaN(value)) {
    modalCallback(value);
  }
  modalCallback = null;
}

function cancelModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  modalCallback = null;
}

function closeModal(event) {
  if (event.target === document.getElementById('modalOverlay')) {
    cancelModal();
  }
}

document.getElementById('modalInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') confirmModal();
});

// ==================== Edit Screen ====================
function showEditScreen() {
  document.getElementById('workoutScreen').classList.add('hidden');
  document.getElementById('editScreen').classList.add('active');
  renderEditList();
}

function saveAndCloseEdit() {
  syncAllEdits();
  saveRoutine(routine);

  document.getElementById('editScreen').classList.remove('active');
  document.getElementById('workoutScreen').classList.remove('hidden');

  // Ensure active group still exists
  if (!routine.groups.find(g => g.id === activeGroupId)) {
    activeGroupId = routine.groups[0]?.id || 'g1';
    saveActiveGroup(activeGroupId);
  }

  renderWorkout();
  showToast('루틴이 저장되었습니다');
}

function renderEditList() {
  const list = document.getElementById('editList');
  list.innerHTML = '';

  routine.groups.forEach((group, gi) => {
    const section = document.createElement('div');
    section.className = 'edit-group-section';
    section.dataset.groupId = group.id;

    // Group header
    const header = document.createElement('div');
    header.className = 'edit-group-header';
    header.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <input class="edit-input edit-group-name" value="${esc(group.name)}" placeholder="그룹 이름" style="font-weight:700; font-size:14px; color:#8e8e93; border:none; background:transparent; padding:0; flex:1;">
        <div style="display:flex; gap:4px;">
          <button class="btn-icon" onclick="moveGroup(${gi}, -1)" ${gi === 0 ? 'disabled' : ''}>▲</button>
          <button class="btn-icon" onclick="moveGroup(${gi}, 1)" ${gi === routine.groups.length - 1 ? 'disabled' : ''}>▼</button>
          <button class="btn-icon delete" onclick="deleteGroup(${gi})" ${routine.groups.length <= 1 ? 'disabled' : ''}>✕</button>
        </div>
      </div>
    `;
    section.appendChild(header);

    // Exercise cards within group
    group.exercises.forEach((ex, ei) => {
      const card = document.createElement('div');
      card.className = 'edit-card';
      card.dataset.id = ex.id;
      card.dataset.groupIdx = gi;
      card.dataset.exIdx = ei;
      card.innerHTML = `
        <div class="edit-card-header">
          <input class="edit-input edit-name" value="${esc(ex.name)}" placeholder="운동 이름">
          <div class="edit-card-actions">
            <button class="btn-icon" onclick="moveExInGroup(${gi}, ${ei}, -1)" ${ei === 0 ? 'disabled' : ''}>▲</button>
            <button class="btn-icon" onclick="moveExInGroup(${gi}, ${ei}, 1)" ${ei === group.exercises.length - 1 ? 'disabled' : ''}>▼</button>
            <button class="btn-icon delete" onclick="deleteExInGroup(${gi}, ${ei})">✕</button>
          </div>
        </div>
        <div class="edit-row">
          <label>무게</label>
          <input class="edit-input edit-weight" type="number" inputmode="decimal" value="${ex.weight !== null ? ex.weight : ''}" placeholder="없음" step="0.5">
          <div class="unit-toggle">
            <button data-unit="reps" class="${ex.unit === 'reps' ? 'active' : ''}" onclick="toggleUnit(this)">횟수</button>
            <button data-unit="seconds" class="${ex.unit === 'seconds' ? 'active' : ''}" onclick="toggleUnit(this)">초</button>
          </div>
        </div>
        <div class="edit-row">
          <label>목표</label>
          <div class="edit-targets">
            <input class="edit-input small edit-t1" type="number" inputmode="numeric" value="${ex.targets[0]}">
            <input class="edit-input small edit-t2" type="number" inputmode="numeric" value="${ex.targets[1]}">
            <input class="edit-input small edit-t3" type="number" inputmode="numeric" value="${ex.targets[2]}">
          </div>
        </div>
      `;
      section.appendChild(card);
    });

    // Add exercise button per group
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add';
    addBtn.textContent = '+ 운동 추가';
    addBtn.onclick = () => addExToGroup(gi);
    section.appendChild(addBtn);

    list.appendChild(section);
  });

  // Add group button
  const addGroupBtn = document.createElement('button');
  addGroupBtn.className = 'btn-add';
  addGroupBtn.style.borderColor = '#007aff';
  addGroupBtn.style.color = '#007aff';
  addGroupBtn.textContent = '+ 그룹 추가';
  addGroupBtn.onclick = addGroup;
  list.appendChild(addGroupBtn);
}

function toggleUnit(btn) {
  const group = btn.parentElement;
  group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function syncAllEdits() {
  const sections = document.querySelectorAll('.edit-group-section');
  sections.forEach((section, gi) => {
    if (gi >= routine.groups.length) return;
    const group = routine.groups[gi];
    const nameInput = section.querySelector('.edit-group-name');
    if (nameInput) group.name = nameInput.value.trim() || `그룹 ${gi+1}`;

    const cards = section.querySelectorAll('.edit-card');
    cards.forEach((card, ei) => {
      if (ei >= group.exercises.length) return;
      const ex = group.exercises[ei];
      ex.name = card.querySelector('.edit-name').value.trim() || '운동';
      const wv = card.querySelector('.edit-weight').value.trim();
      ex.weight = wv === '' ? null : parseFloat(wv);
      if (isNaN(ex.weight)) ex.weight = null;
      const activeUnit = card.querySelector('.unit-toggle .active');
      if (activeUnit) ex.unit = activeUnit.dataset.unit;
      ex.targets[0] = parseInt(card.querySelector('.edit-t1').value) || 0;
      ex.targets[1] = parseInt(card.querySelector('.edit-t2').value) || 0;
      ex.targets[2] = parseInt(card.querySelector('.edit-t3').value) || 0;
    });
  });
}

function moveGroup(gi, direction) {
  syncAllEdits();
  const newIdx = gi + direction;
  if (newIdx < 0 || newIdx >= routine.groups.length) return;
  const temp = routine.groups[gi];
  routine.groups[gi] = routine.groups[newIdx];
  routine.groups[newIdx] = temp;
  renderEditList();
}

function deleteGroup(gi) {
  if (routine.groups.length <= 1) return;
  syncAllEdits();
  routine.groups.splice(gi, 1);
  renderEditList();
}

function addGroup() {
  syncAllEdits();
  routine.groups.push({
    id: uid(),
    name: `그룹 ${routine.groups.length + 1}`,
    exercises: []
  });
  renderEditList();
  const list = document.getElementById('editList');
  list.lastElementChild.scrollIntoView({ behavior: 'smooth' });
}

function moveExInGroup(gi, ei, direction) {
  syncAllEdits();
  const exercises = routine.groups[gi].exercises;
  const newIdx = ei + direction;
  if (newIdx < 0 || newIdx >= exercises.length) return;
  const temp = exercises[ei];
  exercises[ei] = exercises[newIdx];
  exercises[newIdx] = temp;
  exercises.forEach((ex, i) => ex.order = i);
  renderEditList();
}

function deleteExInGroup(gi, ei) {
  syncAllEdits();
  routine.groups[gi].exercises.splice(ei, 1);
  routine.groups[gi].exercises.forEach((ex, i) => ex.order = i);
  renderEditList();
}

function addExToGroup(gi) {
  syncAllEdits();
  routine.groups[gi].exercises.push({
    id: uid(),
    name: '',
    weight: null,
    weightUnit: 'kg',
    unit: 'reps',
    targets: [10, 10, 10],
    order: routine.groups[gi].exercises.length
  });
  renderEditList();
}

// ==================== Utils ====================
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ==================== Init ====================
renderWorkout();
</script>
